<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>huracan | bio</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    
    <style>
        /* === SYSTEM RESET === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Michroma', sans-serif;
            user-select: none;
            -webkit-user-drag: none;
        }

        body, html {
            background-color: #000;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* === 1. BACKGROUND VIDEO (15px BLUR) === */
        .bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: -100;
            filter: blur(15px) brightness(0.35);
            transform: scale(1.1); /* Prevents blurred white edges around the screen */
        }

        /* === 2. TV STATIC & SCANLINES OVERLAY === */
        .tv-static {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04; 
            z-index: -50;
            pointer-events: none;
            animation: staticNoise 0.2s infinite linear;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.3) 51%);
            background-size: 100% 4px;
            z-index: -49;
            pointer-events: none;
        }

        @keyframes staticNoise {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-1%, -1%); }
        }

        /* === 3. CINEMATIC ENTRY SCREEN === */
        #entry-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), visibility 1.2s;
        }

        #entry-text {
            color: #ffffff;
            font-size: 1.2rem;
            letter-spacing: 5px;
            z-index: 10;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            animation: pulse 2s infinite ease-in-out;
        }

        #snow-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 10px #fff); }
            50% { opacity: 0.3; filter: drop-shadow(0 0 0px #fff); }
        }

        /* === 4. 3D REVERSE TILT ENVIRONMENT === */
        .perspective-wrapper {
            perspective: 1200px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
            padding: 20px;
        }

        .tilt-card-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 580px;
            transform-style: preserve-3d;
            transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }

        /* === 5. PREMIUM GLASSMORPHISM CARD (10px BLUR) === */
        .main-card {
            background: rgba(12, 12, 12, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            width: 100%;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), inset 0 1px 1px rgba(255, 255, 255, 0.15), inset 0 -1px 1px rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 25px;
            transform: translateZ(30px);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 25px;
            transform: translateZ(20px);
        }

        .pfp-container {
            position: relative;
            width: 90px;
            height: 90px;
        }

        .pfp-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.15);
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }

        .anime-vein {
            position: absolute;
            top: -6px; right: -6px;
            color: #ff2a2a;
            font-size: 1.3rem;
            text-shadow: 0 0 15px rgba(255, 42, 42, 0.9);
            font-family: sans-serif;
            animation: throb 1.5s infinite;
        }

        @keyframes throb {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .status-badge {
            position: absolute;
            bottom: 0px; left: 0px;
            background: #ffffff;
            color: #000000;
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 0.8rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            font-family: sans-serif;
        }

        .username {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: lowercase;
            text-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }

        .pill-badge {
            align-self: flex-start;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: -10px; margin-left: 2px;
            text-transform: lowercase;
            letter-spacing: 1px;
            transform: translateZ(15px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .info-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            padding-left: 8px;
            text-align: center;
            margin-top: 5px;
            transform: translateZ(10px);
            letter-spacing: 0.5px;
        }

        /* Social Icons */
        .socials-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            align-items: center;
            margin-top: 10px;
            transform: translateZ(25px);
        }

        .social-icon {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.4rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .social-icon:hover { transform: scale(1.25) translateY(-4px); }
        .social-icon.steam:hover { color: #ffffff; filter: drop-shadow(0 5px 10px rgba(255,255,255,0.8)); }
        .social-icon.discord:hover { color: #5865F2; filter: drop-shadow(0 5px 10px rgba(88, 101, 242, 0.8)); }
        .social-icon.roblox:hover { color: #aaaaaa; filter: drop-shadow(0 5px 10px rgba(255, 255, 255, 0.4)); }
        .social-icon.tiktok:hover { color: #ff007f; filter: drop-shadow(0 5px 10px rgba(255, 0, 127, 0.8)); }
        .social-icon.telegram:hover { color: #0088cc; filter: drop-shadow(0 5px 10px rgba(0, 136, 204, 0.8)); }

        /* === 6. INTEGRATED AUDIO PLAYER === */
        .audio-player-container {
            width: 100%;
            background: rgba(12, 12, 12, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            gap: 20px;
            transform: translateZ(25px);
        }

        .time-stamp { 
            color: rgba(255, 255, 255, 0.4); 
            font-size: 0.65rem; 
            min-width: 35px;
            text-align: center;
        }

        .timeline-bar {
            flex-grow: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            position: relative;
            cursor: pointer;
        }

        .timeline-progress {
            width: 0%;
            height: 100%;
            background: #ffffff;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            transition: width 0.1s linear;
        }

        .timeline-progress::after {
            content: ''; position: absolute; right: -5px; top: -4px;
            width: 12px; height: 12px;
            background: #ffffff; border-radius: 50%;
            box-shadow: 0 0 15px rgba(255,255,255,1);
            transition: transform 0.2s;
        }

        .timeline-bar:hover .timeline-progress::after { transform: scale(1.3); }

        .player-controls { display: flex; align-items: center; gap: 15px; }
        
        .control-btn {
            background: none; border: none; color: rgba(255, 255, 255, 0.6);
            font-size: 1rem; cursor: pointer; transition: all 0.2s;
        }
        .control-btn:hover { color: #ffffff; filter: drop-shadow(0 0 8px rgba(255,255,255,0.8)); transform: scale(1.15); }

    </style>
</head>
<body>

    <video class="bg-video" autoplay loop muted playsinline id="bg-vid-element">
        <source src="https://r2.fakecrime.bio/backgrounds/48d57112-2356-4d3b-805d-78022b612aae.mp4" type="video/mp4">
    </video>

    <div class="tv-static"></div>
    <div class="scanlines"></div>

    <div id="entry-overlay" onclick="startBioSite()">
        <canvas id="snow-canvas"></canvas>
        <div id="entry-text">Click</div>
    </div>

    <audio id="bg-track" src="https://files.catbox.moe/wdh4ur.mp3" loop></audio>

    <div class="perspective-wrapper">
        <div class="tilt-card-group" id="tilt-element">
            
            <div class="main-card">
                <div class="profile-header">
                    <div class="pfp-container">
                        <img class="pfp-image" src="https://r2.fakecrime.bio/avatars/6dcd825e-eadc-4568-8ee3-d92919f7f72a.webp" alt="huracan">
                        <div class="anime-vein">💢</div>
                        <div class="status-badge">!</div>
                    </div>
                    <div class="username">huracan</div>
                </div>

                <div class="pill-badge">huracan</div>
                <div class="info-text">German</div>

                <div class="socials-row">
                    <a href="https://steamcommunity.com/profiles/76561199426708994/" target="_blank" class="social-icon steam"><i class="fab fa-steam"></i></a>
                    <a href="https://discordapp.com/users/622889081097158711" target="_blank" class="social-icon discord"><i class="fab fa-discord"></i></a>
                    <a href="https://www.roblox.com/users/1286354240/profile" target="_blank" class="social-icon roblox"><i class="fas fa-cube"></i></a>
                    <a href="https://tiktok.com/@odrcz" target="_blank" class="social-icon tiktok"><i class="fab fa-tiktok"></i></a>
                    <a href="https://t.me/nothuracan" target="_blank" class="social-icon telegram"><i class="fab fa-telegram-plane"></i></a>
                </div>
            </div>

            <div class="audio-player-container">
                <span class="time-stamp" id="current-time">0:00</span>
                <div class="timeline-bar" id="timeline-container">
                    <div class="timeline-progress" id="progress-bar"></div>
                </div>
                <span class="time-stamp" id="total-time">0:00</span>
                
                <div class="player-controls">
                    <button class="control-btn" id="play-pause-toggle" onclick="toggleAudio()"><i class="fas fa-pause"></i></button>
                    <button class="control-btn"><i class="fas fa-circle"></i></button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- 1. REVERSE 3D TILT EFFECT ---
        const tiltElement = document.getElementById('tilt-element');
        
        document.addEventListener('mousemove', (e) => {
            // Reversing the math pushes the card away from the cursor.
            const xAxis = (window.innerWidth / 2 - e.pageX) / 40; 
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40; 
            
            tiltElement.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            tiltElement.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // --- 2. AUDIO & VIDEO ENTRY CONTROLS ---
        const track = document.getElementById('bg-track');
        const playPauseBtn = document.getElementById('play-pause-toggle');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const timelineContainer = document.getElementById('timeline-container');
        let playing = false;

        function startBioSite() {
            const overlay = document.getElementById('entry-overlay');
            const bgVid = document.getElementById('bg-vid-element');
            
            // Cinematic Fade out
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 1200);

            // Ensure background video plays
            bgVid.play().catch(e => console.log("Video autoplay prevented"));

            // Start Audio
            track.volume = 0.4;
            track.play().catch(err => console.log("Audio failed to play."));
            playing = true;
        }

        function toggleAudio() {
            if (playing) {
                track.pause();
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            } else {
                track.play();
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            }
            playing = !playing;
        }

        // --- 3. MEDIA PLAYER SCRUBBER ---
        function formatTime(seconds) {
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            if (sec < 10) sec = '0' + sec;
            return `${min}:${sec}`;
        }

        track.addEventListener('timeupdate', () => {
            if (track.duration) {
                const progressPercent = (track.currentTime / track.duration) * 100;
                progressBar.style.width = progressPercent + "%";
                currentTimeEl.textContent = formatTime(track.currentTime);
                totalTimeEl.textContent = formatTime(track.duration);
            }
        });

        track.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(track.duration);
        });

        timelineContainer.addEventListener('click', (e) => {
            const width = timelineContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = track.duration;
            track.currentTime = (clickX / width) * duration;
        });

        // --- 4. HIGH-PERFORMANCE SNOWFALL ---
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const snowflakes = [];

        for (let i = 0; i < 150; i++) {
            snowflakes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 2 + 0.5,
                speed: Math.random() * 3 + 1,
                opacity: Math.random()
            });
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < snowflakes.length; i++) {
                let p = snowflakes[i];
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2, true);
                ctx.fill();
            }
            updateSnow();
            requestAnimationFrame(drawSnow);
        }

        function updateSnow() {
            for (let i = 0; i < snowflakes.length; i++) {
                let p = snowflakes[i];
                p.y += p.speed;
                if (p.y > height) {
                    snowflakes[i] = { 
                        x: Math.random() * width, 
                        y: 0, 
                        radius: p.radius, 
                        speed: p.speed,
                        opacity: p.opacity
                    };
                }
            }
        }
        drawSnow();

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
