<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>huracan | bio</title>
    <!-- FontAwesome for the social icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts for the wide cyber aesthetic font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
    
    <style>
        /* === RESET & SYSTEM STYLING === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Michroma', sans-serif; /* Applied the wide font globally */
            user-select: none;
        }

        body, html {
            background-color: #000;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* === FULLSCREEN BLURRED VIDEO BACKGROUND === */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -100;
            object-fit: cover;
            filter: blur(10px) brightness(0.4); /* Matched the blur and darkness from the image */
        }

        /* === HEAVY DOT MATRIX OVERLAY === */
        .bg-pattern {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0, 0, 0, 0.8) 3px, transparent 3.5px);
            background-size: 12px 12px;
            z-index: -50;
            pointer-events: none;
        }

        /* === ENTRY SCREEN (BLACK + SNOW) === */
        #entry-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        #entry-text {
            color: #ffffff;
            font-size: 1.2rem;
            letter-spacing: 3px;
            z-index: 10;
            animation: pulse 2s infinite;
        }

        #snow-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* === MAIN CONTAINER === */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* Tighter gap matching the image */
            width: 100%;
            max-width: 450px; /* Slimmer max-width to match image proportions */
            padding: 20px;
            z-index: 10;
        }

        /* Main Bio Card */
        .main-card {
            background: rgba(10, 10, 10, 0.85);
            border-radius: 18px;
            width: 100%;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header Layout: Profile Picture & Name */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Profile Container with Anime Accents */
        .pfp-container {
            position: relative;
            width: 75px;
            height: 75px;
        }

        .pfp-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #222;
        }

        .pfp-container::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            border: 1px dashed rgba(255, 0, 0, 0.5);
            animation: spin 20s linear infinite;
            pointer-events: none;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .anime-vein {
            position: absolute;
            top: -8px; right: -8px;
            color: #ff2a2a;
            font-size: 1.1rem;
            text-shadow: 0 0 8px rgba(255, 42, 42, 0.6);
            font-family: sans-serif;
        }

        .status-badge {
            position: absolute;
            bottom: -2px; left: -2px;
            background: #ffffff;
            color: #000000;
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.7rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            border: 2px solid #0e0e0e;
            font-family: sans-serif;
        }

        /* Typography & Info */
        .username {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: lowercase;
        }

        .pill-badge {
            align-self: flex-start;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.6rem;
            margin-top: -10px; margin-left: 2px;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .info-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.75rem;
            padding-left: 8px;
            text-align: center;
            margin-top: 5px;
        }

        /* Social Icons */
        .socials-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
            margin-top: 5px;
        }

        .social-icon {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            text-decoration: none;
            transition: transform 0.2s ease, text-shadow 0.2s ease, color 0.2s ease;
        }

        .social-icon.steam:hover { color: #ffffff; text-shadow: 0 0 12px rgba(255,255,255,0.8); transform: scale(1.08); }
        .social-icon.discord:hover { color: #5865F2; text-shadow: 0 0 12px rgba(88, 101, 242, 0.8); transform: scale(1.08); }
        .social-icon.roblox:hover { color: #aaaaaa; text-shadow: 0 0 12px rgba(255, 255, 255, 0.5); transform: scale(1.08); }
        .social-icon.tiktok:hover { color: #ff007f; text-shadow: 0 0 12px rgba(255, 0, 127, 0.8); transform: scale(1.08); }
        .social-icon.telegram:hover { color: #0088cc; text-shadow: 0 0 12px rgba(0, 136, 204, 0.8); transform: scale(1.08); }

        /* === DETACHED AUDIO PLAYER BAR === */
        .audio-player-container {
            width: 100%;
            background: rgba(10, 10, 10, 0.85);
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.9);
            gap: 15px;
        }

        .time-stamp { 
            color: rgba(255, 255, 255, 0.5); 
            font-size: 0.6rem; 
        }

        .timeline-bar {
            flex-grow: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            position: relative;
        }

        .timeline-progress {
            width: 0%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 4px;
            position: relative;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
            transition: width 0.1s linear;
        }

        .timeline-progress::after {
            content: ''; position: absolute; right: -4px; top: -3px;
            width: 10px; height: 10px;
            background: #ffffff; border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.9);
        }

        .player-controls { display: flex; align-items: center; gap: 15px; }
        
        .control-btn {
            background: none; border: none; color: rgba(255, 255, 255, 0.85);
            font-size: 0.8rem; cursor: pointer; transition: color 0.2s;
        }
        .control-btn:hover { color: #ffffff; text-shadow: 0 0 8px rgba(255,255,255,0.6); }

    </style>
</head>
<body>

    <!-- Background Video -->
    <video class="bg-video" autoplay loop muted playsinline id="bg-vid-element">
        <source src="https://r2.fakecrime.bio/backgrounds/48d57112-2356-4d3b-805d-78022b612aae.mp4" type="video/mp4">
    </video>

    <!-- Dot Matrix Overlay -->
    <div class="bg-pattern"></div>

    <!-- Entry Screen with Snow -->
    <div id="entry-overlay" onclick="startBioSite()">
        <canvas id="snow-canvas"></canvas>
        <div id="entry-text">Click</div>
    </div>

    <!-- BACKGROUND MUSIC -->
    <audio id="bg-track" src="https://files.catbox.moe/wdh4ur.mp3" loop></audio>

    <div class="wrapper">
        
        <div class="main-card">
            
            <div class="profile-header">
                <div class="pfp-container">
                    <!-- Avatar Link -->
                    <img class="pfp-image" src="https://r2.fakecrime.bio/avatars/6dcd825e-eadc-4568-8ee3-d92919f7f72a.webp" alt="huracan">
                    <div class="anime-vein">💢</div>
                    <div class="status-badge">!</div>
                </div>
                <div class="username">huracan</div>
            </div>

            <div class="pill-badge">huracan</div>
            <div class="info-text">German</div>

            <div class="socials-row">
                <a href="https://steamcommunity.com/profiles/76561199426708994/" target="_blank" class="social-icon steam"><i class="fab fa-steam"></i></a>
                <a href="https://discordapp.com/users/622889081097158711" target="_blank" class="social-icon discord"><i class="fab fa-discord"></i></a>
                <a href="https://www.roblox.com/users/1286354240/profile" target="_blank" class="social-icon roblox"><i class="fas fa-cube"></i></a>
                <a href="https://tiktok.com/@odrcz" target="_blank" class="social-icon tiktok"><i class="fab fa-tiktok"></i></a>
                <a href="https://t.me/nothuracan" target="_blank" class="social-icon telegram"><i class="fab fa-telegram-plane"></i></a>
            </div>

        </div>

        <div class="audio-player-container">
            <span class="time-stamp" id="current-time">0:00</span>
            <div class="timeline-bar">
                <div class="timeline-progress" id="progress-bar"></div>
            </div>
            <span class="time-stamp" id="total-time">0:00</span>
            
            <div class="player-controls">
                <button class="control-btn" id="play-pause-toggle" onclick="toggleAudio()"><i class="fas fa-pause"></i></button>
                <button class="control-btn"><i class="fas fa-circle"></i></button>
            </div>
        </div>

    </div>

    <!-- JAVASCRIPT FOR SNOW & AUDIO -->
    <script>
        const track = document.getElementById('bg-track');
        const playPauseBtn = document.getElementById('play-pause-toggle');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        let playing = false;

        // --- SNOWFALL EFFECT FOR ENTRY SCREEN ---
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        const snowflakes = [];

        for (let i = 0; i < 120; i++) {
            snowflakes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 2 + 1,
                speed: Math.random() * 2 + 0.5
            });
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            for (let i = 0; i < snowflakes.length; i++) {
                let p = snowflakes[i];
                ctx.moveTo(p.x, p.y);
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2, true);
            }
            ctx.fill();
            updateSnow();
            requestAnimationFrame(drawSnow);
        }

        function updateSnow() {
            for (let i = 0; i < snowflakes.length; i++) {
                let p = snowflakes[i];
                p.y += p.speed;
                if (p.y > height) {
                    snowflakes[i] = { x: Math.random() * width, y: 0, radius: p.radius, speed: p.speed };
                }
            }
        }
        drawSnow();

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // --- SITE ENTRY & AUDIO LOGIC ---
        function startBioSite() {
            const overlay = document.getElementById('entry-overlay');
            const bgVid = document.getElementById('bg-vid-element');
            
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 800);

            bgVid.play().catch(e => console.log("Video autoplay prevented"));

            track.volume = 0.35;
            track.play().catch(err => console.log("Audio requires valid MP3 link."));
            playing = true;
        }

        function toggleAudio() {
            if (playing) {
                track.pause();
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            } else {
                track.play();
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            }
            playing = !playing;
        }

        function formatTime(seconds) {
            let min = Math.floor(seconds / 60);
            let sec = Math.floor(seconds % 60);
            if (sec < 10) sec = '0' + sec;
            return `${min}:${sec}`;
        }

        track.addEventListener('timeupdate', () => {
            if (track.duration) {
                const progressPercent = (track.currentTime / track.duration) * 100;
                progressBar.style.width = progressPercent + "%";
                currentTimeEl.textContent = formatTime(track.currentTime);
                totalTimeEl.textContent = formatTime(track.duration);
            }
        });

        track.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(track.duration);
        });
    </script>
</body>
</html>
