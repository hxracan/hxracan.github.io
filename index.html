<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; cursor: url('https://cur.cursors-4u.net/games/gam-4/gam372.cur'), auto; }
        body, html { background-color: #0b0b0b; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100%; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        
        /* Blur overlay for autoplay bypass */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); z-index: 999; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
        #overlay button { background: none; border: 1px solid #7f00ff; color: #fff; padding: 15px 40px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; border-radius: 4px; transition: 0.3s; box-shadow: 0 0 15px rgba(127, 0, 255, 0.4); }
        #overlay button:hover { background: #7f00ff; box-shadow: 0 0 25px rgba(127, 0, 255, 0.8); }

        /* Main Bio Card */
        .profile-card { background: rgba(20, 20, 20, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 40px; width: 380px; text-align: center; backdrop-filter: blur(8px); box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .avatar { width: 110px; height: 110px; border-radius: 50%; border: 2px solid #7f00ff; box-shadow: 0 0 20px rgba(127, 0, 255, 0.5); object-fit: cover; }
        h1 { margin-top: 15px; font-size: 1.8rem; letter-spacing: 1px; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .tag { font-size: 0.85rem; color: #7f00ff; font-weight: bold; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1.5px; }
        
        /* Links style */
        .links { display: flex; flex-direction: column; gap: 12px; }
        .link-btn { display: block; background: rgba(30, 30, 30, 0.5); border: 1px solid rgba(255,255,255,0.05); padding: 12px; color: #ccc; text-decoration: none; border-radius: 6px; transition: 0.2s; font-size: 0.95rem; }
        .link-btn:hover { background: rgba(127, 0, 255, 0.15); border-color: #7f00ff; color: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(127,0,255,0.2); }
    </style>
</head>
<body>

    <div id="overlay">
        <button onclick="enterSite()">Enter</button>
    </div>

    <!-- Audio Element (Add direct .mp3 link or discord attachment link here) -->
    <audio id="bg-music" src="YOUR_DIRECT_MP3_LINK_HERE" loop></audio>

    <div class="profile-card">
        <img class="avatar" src="YOUR_AVATAR_IMAGE_URL" alt="PFP">
        <h1>YourName</h1>
        <div class="tag">developer // gamer</div>
        
        <div class="links">
            <a href="https://discord.com" target="_blank" class="link-btn">Discord</a>
            <a href="https://github.com" target="_blank" class="link-btn">GitHub</a>
            <a href="https://twitter.com" target="_blank" class="link-btn">Twitter</a>
        </div>
    </div>

    <script>
        function enterSite() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 500);
            const music = document.getElementById('bg-music');
            music.volume = 0.3; // Set volume to 30%
            music.play();
        }
    </script>
</body>
</html>
